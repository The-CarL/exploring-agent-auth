name: agentauth

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: agentauth-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import
    networks:
      - agentauth

  opa:
    image: openpolicyagent/opa:1.15.2
    container_name: agentauth-opa
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - /policies
    ports:
      - "8181:8181"
    volumes:
      - ./infra/opa:/policies:ro
    networks:
      - agentauth

networks:
  agentauth:
    name: agentauth
